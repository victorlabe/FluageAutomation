version: 1

script:
  - rm -rf AppDir || true
  - mkdir -p AppDir/usr/bin
  - cp -r dist/FluageAutomation/* AppDir/usr/bin/
  - cp assets/app.png AppDir/app.png

AppDir:
  path: ./AppDir

  app_info:
    id: com.victor.fluageautomation
    name: FluageAutomation
    icon: app
    version: "1.07.001"
    exec: usr/bin/FluageAutomation
    exec_args: $@

  files:
    include:
      - usr/bin/**
      - app.png

  runtime:
    env:
      APPDIR: $APPDIR

AppImage:
  arch: x86_64